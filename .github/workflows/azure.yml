name: Azure Python 
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        make install-azure
    - name: Lint
      run: |
        make lint
    - name: Test
      run: |
        make test
